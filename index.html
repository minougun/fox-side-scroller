<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fox Side Scroller</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="shell">
      <canvas id="game" width="960" height="540" aria-label="Fox Side Scroller game screen"></canvas>
      <div class="hud" aria-hidden="true">
        <div class="meter"><span id="hearts"></span></div>
        <div class="counter"><span id="fruit">0</span>/<span id="fruitTotal">0</span></div>
        <div class="score">SCORE <span id="score">0</span></div>
        <div id="specialGauge" class="special-gauge" aria-hidden="true">
          <span id="specialGaugeFill" class="special-gauge-fill"></span>
          <span id="specialGaugeText" class="special-gauge-text">必殺 0%</span>
        </div>
        <div id="weaponHud" class="weapon-hud">
          <span class="weapon-slot" data-weapon="sword"></span>
          <span class="weapon-slot" data-weapon="gun"></span>
        </div>
        <button id="audioButton" class="icon-button" type="button" title="Sound">♪</button>
      </div>
      <div id="touchControls" class="touch-controls" aria-hidden="true"></div>
      <div class="start-menu" aria-hidden="true">
        <div id="touchHint" class="touch-hint" aria-hidden="true">
          <div data-i18n="touchMove">長押し: 移動</div>
          <div data-i18n="touchJump">ダブルタップ: ジャンプ</div>
          <div data-i18n="touchAttack">タップ: 攻撃</div>
        </div>
        <section id="languagePanel" class="language-panel" aria-label="Language">
          <div class="language-title" data-i18n="languageTitle">言語</div>
          <div class="language-options">
            <button class="language-button selected" type="button" data-language="ja">日本語</button>
            <button class="language-button" type="button" data-language="en">English</button>
          </div>
        </section>
        <section id="difficultyPanel" class="difficulty-panel" aria-label="Difficulty">
          <div class="difficulty-title" data-i18n="difficultyTitle">難易度</div>
          <div class="difficulty-options">
            <button class="difficulty-button" type="button" data-difficulty="easy" data-i18n="easy">やさしい</button>
            <button class="difficulty-button selected" type="button" data-difficulty="normal" data-i18n="normal">ふつう</button>
            <button class="difficulty-button" type="button" data-difficulty="hard" data-i18n="hard">むずかしい</button>
          </div>
        </section>
        <button id="startButton" class="start-button" type="button" data-i18n="start">スタート</button>
      </div>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
